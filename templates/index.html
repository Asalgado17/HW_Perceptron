<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Perceptron Classifier</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body>
      <h1 class="title">Perceptron</h1>
      <p id="currentTime"></p>
      
      <h2>4x4 Dropdown Grid</h2>

      <form method="POST">
        <!-- 4x4 Table of Dropdowns -->
        <table border="1">
          {% for i in range(4) %}
          <tr>
            {% for j in range(4) %}
            <td>
              <select name="input_{{ i }}_{{ j }}">
                <option value="0">0</option>
                <option value="1">1</option>
              </select>
            </td>
            {% endfor %}
          </tr>
          {% endfor %}
        </table>

        <br>

        <!-- Submit Button -->
        <input type="submit" value="Submit" class="myButton">
      </form>

      {% if prediction is not none %}
      <div style="margin-top: 20px; background-color: #f0f0f0; padding: 15px; border-radius: 8px; text-align: center;">
          <p style="font-size: 18px;">
              <strong>Prediction: {{ prediction }}</strong>
          </p>
          
          {% if confidence is not none %}
          <p style="font-size: 18px;">
              <strong>{{ confidence }}% confident</strong>
          </p>
          
      </div>
      {% endif %}
  </body>
</html>
